<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Screen bezel -->
  <rect x="28" y="36" width="200" height="140" rx="12"
        fill="#0f172a" stroke="#06b6d4" stroke-width="3"/>

  <!-- Screen inner glow -->
  <rect x="36" y="44" width="184" height="124" rx="6"
        fill="#020617" stroke="#0891b2" stroke-width="1" opacity="0.6"/>

  <!-- "YW" text on screen -->
  <text x="128" y="130" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="64" font-weight="900"
        fill="#06b6d4" letter-spacing="4">YW</text>

  <!-- Scan line accent on screen -->
  <line x1="36" y1="60" x2="220" y2="60" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>

  <!-- Keyboard base -->
  <rect x="48" y="186" width="160" height="38" rx="8"
        fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <!-- Keyboard keys -->
  <g fill="#475569" opacity="0.8">
    <rect x="58" y="194" width="12" height="8" rx="1.5"/>
    <rect x="74" y="194" width="12" height="8" rx="1.5"/>
    <rect x="90" y="194" width="12" height="8" rx="1.5"/>
    <rect x="106" y="194" width="12" height="8" rx="1.5"/>
    <rect x="122" y="194" width="12" height="8" rx="1.5"/>
    <rect x="138" y="194" width="12" height="8" rx="1.5"/>
    <rect x="154" y="194" width="12" height="8" rx="1.5"/>
    <rect x="170" y="194" width="12" height="8" rx="1.5"/>
    <rect x="186" y="194" width="12" height="8" rx="1.5"/>

    <!-- Spacebar -->
    <rect x="74" y="206" width="108" height="8" rx="1.5"/>
  </g>

  <!-- Corner accents -->
  <circle cx="256" cy="256" r="4" fill="#06b6d4" opacity="0.4"/>
</svg>
